<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --g:#D4AF6A;--gl:#EED898;--gd:#7A5A26;
    --cr:#F5EDD8;--cs:#A29080;--ct:#5C5275;
    --bg:#0A0812;--bgs:#06050F;--bgc:#110E1C;--bgf:#1A1630;
    --bdr:rgba(212,175,106,.1);--bdrs:rgba(212,175,106,.26);
    --sp:#5DAA8A;--fi:#C97A7A;--ca:#D4AF6A;--pe:#8B72C8;--tr:#C4825C;
  }
  html,body{height:100%;background:var(--bg);color:var(--cr);font-family:'DM Sans',sans-serif;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

  .app{
    display:flex;width:100%;max-width:980px;min-height:580px;
    border-radius:16px;overflow:hidden;
    border:0.5px solid rgba(212,175,106,.3);
    box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 0.5px rgba(212,175,106,.08) inset;
  }

  /* ── SIDEBAR ── */
  .sb{width:228px;flex-shrink:0;border-right:0.5px solid var(--bdr);background:var(--bgs);overflow-y:auto;max-height:580px;}
  .sb-hd{padding:22px 16px 16px;border-bottom:0.5px solid var(--bdr);position:relative;overflow:hidden;min-height:108px;}
  .sb-brand{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--g);letter-spacing:.18em;position:relative;z-index:2;}
  .sb-brand em{font-style:italic;font-weight:300;opacity:.85;}
  .sb-tag{font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--ct);margin-top:4px;position:relative;z-index:2;}
  .sb-div{display:flex;align-items:center;gap:6px;margin:12px 0 8px;position:relative;z-index:2;}
  .sb-dl{flex:1;height:0.5px;background:var(--bdr);}
  .sb-dd{width:6px;height:6px;transform:rotate(45deg);background:var(--g);opacity:.45;flex-shrink:0;}
  .sb-stat{font-size:9px;color:var(--ct);position:relative;z-index:2;}
  .sb-pb{height:1px;background:var(--bdr);overflow:hidden;border-radius:1px;margin-top:5px;}
  .sb-pbf{height:1px;background:var(--g);transition:width .4s;}
  .ch{display:flex;align-items:center;gap:7px;padding:10px 14px 4px;cursor:pointer;user-select:none;}
  .ch:hover .ch-nm{color:var(--cs);}
  .ch-nm{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ct);flex:1;transition:color .15s;}
  .ch-arr{font-size:8px;color:var(--ct);}
  .pi{display:flex;align-items:center;gap:7px;padding:7px 12px 7px 22px;cursor:grab;border-left:2px solid transparent;transition:background .15s,opacity .15s;}
  .pi:hover{background:rgba(212,175,106,.04);}
  .pi.sel{background:rgba(212,175,106,.08);}
  .pi.dragging{opacity:.4;cursor:grabbing;}
  .pi.drop-above{box-shadow:inset 0 1.5px 0 0 var(--g);}
  .pi.drop-below{box-shadow:inset 0 -1.5px 0 0 var(--g);}
  .pi-nm{font-size:12.5px;color:var(--cs);flex:1;font-weight:300;line-height:1.3;}
  .pi.sel .pi-nm{color:var(--cr);font-weight:400;}
  .pi-pct{font-size:9px;color:var(--ct);}
  .pi.sel .pi-pct{color:var(--g);font-weight:500;}
  .sb-add{padding:5px 14px 5px 22px;font-size:10px;color:var(--ct);cursor:pointer;}
  .sb-add:hover{color:var(--g);}
  .sb-form{padding:8px 14px 12px;border-top:0.5px solid var(--bdr);}
  .sb-form label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ct);display:block;margin:8px 0 3px;}
  .sb-form input,.sb-form select{width:100%;background:rgba(255,255,255,.04);border:0.5px solid var(--bdr);border-radius:5px;color:var(--cr);font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 8px;}
  .sb-form input::placeholder{color:var(--ct);}

  /* ── MAIN ── */
  .mn{flex:1;overflow-y:auto;max-height:580px;padding:24px 26px;background:var(--bg);}
  .ov-fr{border:0.5px solid var(--bdr);border-radius:12px;padding:22px 20px 18px;position:relative;}
  .oc{position:absolute;width:16px;height:16px;}
  .oc.tl{top:-1px;left:-1px;border-top:1.5px solid var(--g);border-left:1.5px solid var(--g);border-radius:12px 0 0 0;}
  .oc.tr{top:-1px;right:-1px;border-top:1.5px solid var(--g);border-right:1.5px solid var(--g);border-radius:0 12px 0 0;}
  .oc.bl{bottom:-1px;left:-1px;border-bottom:1.5px solid var(--g);border-left:1.5px solid var(--g);border-radius:0 0 0 12px;}
  .oc.br{bottom:-1px;right:-1px;border-bottom:1.5px solid var(--g);border-right:1.5px solid var(--g);border-radius:0 0 12px 0;}
  .ov-ey{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ov-ey-l{height:0.5px;width:18px;background:var(--g);opacity:.5;}
  .ov-ey-t{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--g);}
  .ov-ttl{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;color:var(--cr);line-height:1.2;margin-bottom:6px;}
  .ov-sub{font-size:12px;color:var(--cs);margin-bottom:14px;font-weight:300;}
  .ov-bar{height:1px;background:var(--bdr);overflow:hidden;margin-bottom:4px;}
  .ov-barf{height:1px;background:var(--g);}
  .ov-bl{font-size:9px;color:var(--ct);letter-spacing:.06em;margin-bottom:16px;}
  .ov-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ov-cat{padding:13px 14px;border:0.5px solid var(--bdr);border-left:2.5px solid;border-radius:10px;cursor:pointer;background:var(--bgc);transition:background .15s;position:relative;overflow:hidden;}
  .ov-cat:hover{background:rgba(255,255,255,.03);}
  .ov-cat-ico{position:absolute;right:8px;bottom:6px;opacity:.1;}
  .ov-cat-nm{font-size:13px;font-weight:400;color:var(--cr);margin-bottom:2px;}
  .ov-cat-me{font-size:10px;color:var(--ct);}
  .ov-cat-br{height:1.5px;border-radius:1px;margin-top:10px;opacity:.5;}
  .det-ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .det-ttl{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--cr);line-height:1.2;margin-bottom:6px;cursor:text;}
  .det-ttl:hover{opacity:.85;}
  .det-ds{font-size:13px;color:var(--cs);line-height:1.75;margin-bottom:20px;font-weight:300;cursor:text;}
  .det-ds:hover{opacity:.85;}
  .det-tr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .sdiv{display:flex;align-items:center;gap:8px;margin:20px 0 10px;}
  .sdiv-l{flex:1;height:0.5px;background:var(--bdr);}
  .sdiv-d{width:7px;height:7px;transform:rotate(45deg);background:var(--g);flex-shrink:0;opacity:.5;border-radius:1px;}
  .sdiv-t{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--g);}
  .nb{display:flex;align-items:baseline;gap:7px;margin-bottom:10px;position:relative;}
  .nc{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--g);line-height:1;}
  .nt{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cs);}
  .nu{font-size:10px;color:var(--ct);letter-spacing:.06em;}
  .pbb{height:3px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:4px;}
  .pbf{height:100%;border-radius:2px;transition:width .4s;}
  .pp{font-size:10px;color:var(--ct);}
  .mi{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bdr);position:relative;}
  .mi:last-child{border-bottom:none;}
  .mg{width:14px;height:14px;transform:rotate(45deg);border:0.5px solid rgba(212,175,106,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;border-radius:2px;}
  .mg.on{border-color:transparent;}
  .mg-in{width:7px;height:7px;border-radius:1px;display:none;}
  .mg.on .mg-in{display:block;}
  .mt{font-size:13px;color:var(--cs);flex:1;font-weight:300;}
  .mt.on{color:var(--ct);text-decoration:line-through;}
  .md{font-size:9px;color:var(--ct);}
  .li{padding:10px 0;border-bottom:0.5px solid var(--bdr);position:relative;}
  .li:last-child{border-bottom:none;}
  .lh{display:flex;justify-content:space-between;margin-bottom:4px;}
  .ld{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:var(--ct);}
  .lv{font-size:10px;font-weight:500;color:var(--g);}
  .ln{font-size:13px;color:var(--cs);line-height:1.7;font-weight:300;}
  .fb{background:var(--bgf);border:0.5px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:10px;}
  .fb label{font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ct);display:block;margin-bottom:4px;}
  .fb input,.fb textarea,.fb select{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.04);border:0.5px solid var(--bdr);border-radius:6px;color:var(--cr);padding:7px 10px;}
  .fb input::placeholder,.fb textarea::placeholder{color:var(--ct);}
  .fb textarea{height:68px;resize:vertical;}
  .fb .fr{margin-bottom:10px;}
  .acts{display:flex;gap:6px;margin-top:8px;}
  .btn{padding:7px 14px;border:0.5px solid var(--bdrs);border-radius:8px;background:transparent;color:var(--cs);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;transition:all .15s;}
  .btn:hover{background:rgba(212,175,106,.08);color:var(--cr);}
  .btng{background:var(--g);border-color:var(--g);color:#110800;font-weight:500;}
  .btng:hover{opacity:.9;background:var(--g);}
  .btns{padding:5px 11px;font-size:11px;}
  .ssel{font-size:10px;padding:4px 8px;border:0.5px solid var(--bdr);border-radius:8px;background:var(--bgc);color:var(--cs);font-family:'DM Sans',sans-serif;cursor:pointer;}
  .emp{font-size:12px;color:var(--ct);padding:8px 0;font-style:italic;}
  .ir{display:flex;gap:6px;align-items:center;margin-top:8px;}
  .ir input{flex:1;background:rgba(255,255,255,.04);border:0.5px solid var(--bdr);border-radius:6px;color:var(--cr);font-size:13px;padding:6px 10px;font-family:'DM Sans',sans-serif;}
  .ir input::placeholder{color:var(--ct);}
  /* Scrollbar */
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(212,175,106,.2);border-radius:2px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(212,175,106,.35);}

  @media (max-width: 720px){
    body{padding:0;align-items:flex-start;}
    .app{flex-direction:column;border-radius:0;border:none;width:100%;max-width:none;min-height:100vh;}
    .sb{width:100%;max-height:none;border-right:none;border-bottom:0.5px solid var(--bdr);overflow-x:auto;overflow-y:hidden;}
    .sb-hd{padding:14px 14px 12px;min-height:auto;}
    .sb-brand{font-size:16px;}
    /* Hide deep sidebar; show only category chips horizontally */
    .ch{display:inline-flex;padding:8px 12px;border:0.5px solid var(--bdr);border-radius:18px;margin:0 4px 6px 0;}
    .ch:first-child{margin-left:14px;}
    .pi{display:none;} /* projects hidden by default on mobile; tapping a chip will reveal them in v2 */
    .sb-add{display:none;} /* hide "+ add project" on mobile so chips sit horizontally */
    .sb-form{display:none;} /* same — add-project form is desktop-only in v1 */
    .gear{display:inline-block;border-top:none;margin:0 4px 6px 0;padding:8px 12px;border:0.5px solid var(--bdr);border-radius:18px;}
    .mn{padding:18px 16px;max-height:none;}
    .ov-cats{grid-template-columns:1fr;}
    /* Tap targets ≥44px */
    .mg{width:24px;height:24px;}
    .mg-in{width:11px;height:11px;}
    .btn{padding:10px 16px;font-size:13px;}
    .btns{padding:8px 12px;font-size:12px;}
  }

  .savi{position:absolute;top:18px;right:18px;width:14px;height:14px;opacity:0;transition:opacity .3s;pointer-events:none;}
  .savi.on{opacity:.85;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.15);opacity:1}}
  .gear{padding:14px;font-size:14px;color:var(--ct);cursor:pointer;opacity:.55;border-top:0.5px solid var(--bdr);margin-top:14px;}
  .gear:hover{opacity:1;color:var(--g);}
  .drawer{position:fixed;inset:0;background:rgba(6,5,15,.85);display:none;align-items:center;justify-content:center;z-index:9000;}
  .drawer.on{display:flex;}
  .drawer-c{background:var(--bgf);border:0.5px solid var(--bdrs);border-radius:14px;padding:24px;width:340px;}
  .drawer-c h3{font-family:'Cormorant Garamond',serif;color:var(--cr);font-size:20px;font-style:italic;margin-bottom:16px;}
  .drawer-c .row{margin-bottom:10px;}
  .import-box{width:100%;height:140px;background:rgba(255,255,255,.04);border:0.5px solid var(--bdr);border-radius:8px;color:var(--cr);font-family:monospace;font-size:11px;padding:8px;}

  /* Login view */
  .lv{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:420px;padding:48px 28px;}
  .lv-brand{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--g);letter-spacing:.18em;margin-bottom:6px;}
  .lv-brand em{font-style:italic;font-weight:300;opacity:.85;}
  .lv-tag{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ct);margin-bottom:36px;}
  .lv-ttl{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--cr);line-height:1.2;margin-bottom:20px;text-align:center;}
  .lv-fld{width:100%;margin-bottom:14px;}
  .lv-fld label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ct);display:block;margin-bottom:5px;}
  .lv-fld input{width:100%;background:rgba(255,255,255,.04);border:0.5px solid var(--bdrs);border-radius:8px;color:var(--cr);font-size:15px;padding:11px 14px;font-family:'DM Sans',sans-serif;letter-spacing:.02em;}
  .lv-fld input:focus{outline:none;border-color:var(--g);}
  .lv-act{width:100%;}
  .lv-msg{font-size:11px;color:var(--cs);margin-top:14px;text-align:center;line-height:1.6;font-style:italic;}
  .lv-otp{font-size:11px;color:var(--g);margin-top:10px;cursor:pointer;text-align:center;text-decoration:underline;text-decoration-color:rgba(212,175,106,.4);}
  .lv-otp:hover{text-decoration-color:var(--g);}

  /* ── INLINE EDIT AFFORDANCES ── */
  /* Shared pencil / delete button base */
  .ed-btn{
    background:none;border:none;cursor:pointer;padding:2px 4px;
    font-size:11px;color:var(--ct);opacity:0;
    transition:opacity .15s,color .15s;line-height:1;flex-shrink:0;
  }
  .ed-btn:hover{color:var(--g);opacity:1!important;}

  /* Pencil on project title hover */
  .det-ttl-wrap{position:relative;display:flex;align-items:flex-start;gap:6px;cursor:text;margin-bottom:6px;}
  .det-ttl-wrap:hover .ed-btn{opacity:.45;}
  .det-ttl-wrap .det-ttl{margin-bottom:0;flex:1;}

  /* Description wrapper */
  .det-ds-wrap{position:relative;margin-bottom:20px;cursor:text;}
  .det-ds-wrap:hover .ed-btn{opacity:.45;}
  .det-ds-wrap .det-ds{margin-bottom:0;}
  .det-ds-wrap .ed-btn{position:absolute;top:0;right:0;}

  /* Inline edit inputs — match .fb style */
  .inline-input{
    width:100%;font-size:inherit;font-family:'DM Sans',sans-serif;
    background:rgba(255,255,255,.04);border:0.5px solid var(--bdrs);
    border-radius:6px;color:var(--cr);padding:5px 9px;
    outline:none;transition:border-color .15s;
  }
  .inline-input:focus{border-color:var(--g);}
  .inline-textarea{
    width:100%;font-size:13px;font-family:'DM Sans',sans-serif;
    background:rgba(255,255,255,.04);border:0.5px solid var(--bdrs);
    border-radius:6px;color:var(--cr);padding:7px 10px;
    outline:none;resize:vertical;min-height:48px;max-height:140px;
    transition:border-color .15s;line-height:1.75;
  }
  .inline-textarea:focus{border-color:var(--g);}
  .inline-actions{display:flex;gap:5px;margin-top:5px;}
  .inline-hint{font-size:9px;color:var(--ct);margin-top:3px;letter-spacing:.05em;}

  /* Numeric target edit */
  .tgt-edit-wrap{display:flex;align-items:baseline;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
  .tgt-edit-pencil-wrap{display:flex;align-items:baseline;gap:7px;margin-bottom:10px;position:relative;}
  .tgt-edit-pencil-wrap:hover .ed-btn{opacity:.45;}
  .tgt-form{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .tgt-form input{
    background:rgba(255,255,255,.04);border:0.5px solid var(--bdrs);
    border-radius:6px;color:var(--cr);font-size:13px;padding:5px 8px;
    font-family:'DM Sans',sans-serif;outline:none;
  }
  .tgt-form input:focus{border-color:var(--g);}
  .tgt-form .tw{width:88px;}
  .tgt-form .uw{width:72px;}

  /* Milestone row edit */
  .mi-actions{display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0;}
  .mi:hover .mi-actions{opacity:1;}
  .mi-edit-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--bdr);width:100%;}
  .mi-edit-row:last-child{border-bottom:none;}
  .mi-edit-row input{
    flex:1;font-size:13px;font-family:'DM Sans',sans-serif;
    background:rgba(255,255,255,.04);border:0.5px solid var(--bdrs);
    border-radius:6px;color:var(--cr);padding:5px 9px;outline:none;
  }
  .mi-edit-row input:focus{border-color:var(--g);}

  /* Log entry row edit */
  .li-actions{display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .15s;position:absolute;top:8px;right:0;}
  .li:hover .li-actions{opacity:1;}

  /* Confirmation toast for destructive actions */
  .conf-toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--bgf);border:0.5px solid var(--g);border-radius:10px;
    padding:11px 16px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.5);
    display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--cr);
    min-width:240px;
  }
  .conf-toast-msg{flex:1;}
  .conf-toast-yes{
    background:rgba(212,175,106,.15);border:0.5px solid var(--g);
    border-radius:6px;color:var(--g);font-size:11px;padding:4px 10px;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;
  }
  .conf-toast-yes:hover{background:rgba(212,175,106,.28);}
  .conf-toast-no{
    background:none;border:0.5px solid rgba(255,255,255,.1);
    border-radius:6px;color:var(--ct);font-size:11px;padding:4px 10px;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;
  }
  .conf-toast-no:hover{background:rgba(255,255,255,.05);}

  /* Project delete zone at bottom of detail */
  .proj-del-zone{
    margin-top:28px;padding-top:14px;border-top:0.5px solid var(--bdr);
    display:flex;align-items:center;gap:8px;
  }
  .proj-del-btn{
    font-size:10px;color:var(--ct);background:none;border:none;cursor:pointer;
    padding:4px 6px;border-radius:6px;font-family:'DM Sans',sans-serif;
    letter-spacing:.04em;transition:all .15s;opacity:.55;
  }
  .proj-del-btn:hover{color:var(--fi);opacity:1;}
  .proj-del-btn.confirm{
    color:var(--fi);border:0.5px solid var(--fi);opacity:1;
    background:rgba(201,122,122,.07);padding:4px 10px;
  }

<script>
// ─────────────────────────────────────────────────────────────────

const SUPABASE_URL = 'https://kfbhhdlpsiwyajkfktqb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYmhoZGxwc2l3eWFqa2ZrdHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjAwNzAsImV4cCI6MjA5MzAzNjA3MH0.mkFSz-zpt6-bOP6BC7DIZsbHPslbLxayEcog-KyvoXo';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {

const CC={spiritual:'#5DAA8A',fitness:'#C97A7A',career:'#D4AF6A',personal:'#8B72C8',travel:'#C4825C'};

function catSVG(id,col,sz=14){

function starSVG(sz,op){return `<svg width="${sz}" height="${sz}" viewBox="0 0 20 20" fill="none"><path d="M10 1L11.8 8.2L19 10L11.8 11.8L10 19L8.2 11.8L1 10L8.2 8.2Z" fill="#D4AF6A" opacity="${op}"/></svg>`;}

// ── STATE ──
let S={
  selId:null,data:null,collapsed:{},
  showEntry:false,showAddMs:false,showEditNum:false,addProjCat:null,
  // inline-edit state
  editingField:null,   // 'name' | 'desc' | 'tgt'
  editingMsId:null,    // milestone id being edited
  editingLogId:null,   // log entry id being edited
  deleteProjConfirm:false, // two-step project delete
};

// ── CLOUD STORAGE ──
async function loadFromCloud(){
  // Ensure categories exist for this user
  const{data:cats,error:e1}=await sb.from('categories').select('*').order('sort_order');
  if(e1){console.error(e1);return;}
  if(!cats||cats.length===0){
    await sb.rpc('seed_categories_for_current_user');
    return loadFromCloud();
  }

  const[{data:projects},{data:milestones},{data:logEntries}]=await Promise.all([
    sb.from('projects').select('*').is('deleted_at',null).order('sort_order').order('created_at'),
    sb.from('milestones').select('*').is('deleted_at',null).order('sort_order'),
    sb.from('log_entries').select('*').is('deleted_at',null).order('date',{ascending:true}),
  ]);

  // Reshape into the legacy S.data structure the renderer already understands
  S.data={
    categories:cats.map(c=>({id:c.id,name:c.name})),
    projects:(projects||[]).map(p=>({
      id:p.id,catId:p.category_id,name:p.name,desc:p.description,sortOrder:p.sort_order,
      hasNum:p.has_num,cur:Number(p.cur),tgt:Number(p.tgt),unit:p.unit,
      hasMil:true,hasLog:true,
      mil:(milestones||[]).filter(m=>m.project_id===p.id).map(m=>({
        id:m.id,t:m.title,d:m.done,dt:m.done_at?m.done_at.slice(0,10):null
      })),
      log:(logEntries||[]).filter(l=>l.project_id===p.id).map(l=>({
        id:l.id,date:l.date,note:l.note,val:l.val!=null?Number(l.val):null
      })),
      status:p.status
    }))
  };
}

// uid() now uses crypto.randomUUID() for safer cross-device IDs.
function uid(){return crypto.randomUUID();}

// ── HELPERS ──
function getPct(p){if(p.hasNum&&p.tgt>0)return Math.min(100,Math.round(p.cur/p.tgt*100));const t=p.mil.length;if(!t)return 0;return Math.round(p.mil.filter(m=>m.d).length/t*100);}
function fmt(d){if(!d)return'';try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return d;}}
function today(){return new Date().toISOString().split('T')[0];}
// Escape HTML to safely embed arbitrary text in innerHTML
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── RENDER SIDEBAR ──
function renderSidebar(){
  const ps=S.data.projects;
  const overall=Math.round(ps.reduce((s,p)=>s+getPct(p),0)/ps.length);
  const patSVG=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><path d="M18 3L19.5 16.5L33 18L19.5 19.5L18 33L16.5 19.5L3 18L16.5 16.5Z" fill="rgba(212,175,106,0.055)"/></svg>`;
  const patURL=`data:image/svg+xml,${encodeURIComponent(patSVG)}`;
  const decorStars=
    `<div style="position:absolute;top:10px;right:16px;pointer-events:none">${starSVG(16,.28)}</div>`+
    `<div style="position:absolute;top:24px;right:36px;pointer-events:none">${starSVG(9,.16)}</div>`+
    `<div style="position:absolute;bottom:14px;right:12px;pointer-events:none">${starSVG(10,.2)}</div>`+
    `<div style="position:absolute;bottom:6px;right:34px;pointer-events:none">${starSVG(6,.12)}</div>`+
    `<div style="position:absolute;top:6px;right:52px;pointer-events:none">${starSVG(7,.1)}</div>`;

  let h=`<div class="sb-hd" style="background-color:rgba(0,0,0,.25)">${decorStars}
    <div class="sb-brand" style="position:relative;z-index:2">N O U R I N <em>&</em></div>
    <div class="sb-tag" style="position:relative;z-index:2">her vision · year one</div>
    <div class="sb-div" style="position:relative;z-index:2"><div class="sb-dl"></div><div class="sb-dd"></div><div class="sb-dl"></div></div>
    <div class="sb-stat" style="position:relative;z-index:2">${ps.filter(p=>p.status==='completed').length} done · ${ps.length} projects</div>
    <div class="sb-pb" style="position:relative;z-index:2;margin-top:6px"><div class="sb-pbf" style="width:${overall}%"></div></div>
    <div class="sb-stat" style="position:relative;z-index:2;margin-top:3px">${overall}% overall</div>
  </div>`;

  S.data.categories.forEach(c=>{
    const cps=ps.filter(p=>p.catId===c.id);
    const col=CC[c.id];const open=S.collapsed[c.id]!==true;
    h+=`<div class="ch" data-act="toggle-cat" data-cat="${c.id}">${catSVG(c.id,col,9)}<span class="ch-nm">${c.name}</span><span class="ch-arr">${open?'▾':'▸'}</span></div>`;
    if(open){
      cps.forEach(p=>{
        const sel=p.id===S.selId;
        h+=`<div class="pi${sel?' sel':''}" draggable="true" style="border-left-color:${sel?CC[p.catId]:'transparent'}" data-act="sel" data-proj="${p.id}" data-cat="${p.catId}"><span class="pi-nm">${esc(p.name)}</span><span class="pi-pct">${getPct(p)}%</span></div>`;
      });
      if(S.addProjCat===c.id){
        h+=`<div class="sb-form"><label>Name</label><input id="np-n" type="text"><label>Description</label><input id="np-d" type="text"><label>Numeric target?</label><select id="np-nt"><option value="no">No</option><option value="yes">Yes</option></select><div id="np-nf" style="display:none"><label>Start · Target · Unit</label><div style="display:flex;gap:4px;margin-top:3px"><input id="np-c" type="number" value="0" style="width:44px;padding:5px 6px"><input id="np-t" type="number" placeholder="target" style="width:56px;padding:5px 6px"><input id="np-u" type="text" placeholder="unit"></div></div><div class="acts"><button class="btn btng btns" data-act="save-proj" data-cat="${c.id}">Save</button><button class="btn btns" data-act="cancel-add-proj">Cancel</button></div></div>`;
      } else {
        h+=`<div class="sb-add" data-act="start-add-proj" data-cat="${c.id}">+ add project</div>`;
      }
    }
  });
  h+=`<div class="gear" data-act="open-drawer" title="Settings">⚙</div>`;
  const el=document.getElementById('sidebar');
  el.innerHTML=h;el.style.backgroundImage=`url("${patURL}")`;el.style.backgroundRepeat='repeat';
}

// ── RENDER MAIN ──
function renderMain(){
  const m=document.getElementById('main');
  if(!S.selId){m.innerHTML=vOverview();return;}
  const p=S.data.projects.find(x=>x.id===S.selId);
  if(!p){m.innerHTML=vOverview();return;}
  const col=CC[p.catId];const pct=getPct(p);
  const catName=S.data.categories.find(c=>c.id===p.catId)?.name||'';

  // ── Project name (Feature 1) ──
  let titleHtml;
  if(S.editingField==='name'){
    titleHtml=`<div style="margin-bottom:6px">
      <input id="ei-name" class="inline-input" style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400" value="${esc(p.name)}">
      <div class="inline-hint">Enter to save · Esc to cancel</div>
    </div>`;
  } else {
    titleHtml=`<div class="det-ttl-wrap" data-act="edit-name">
      <div class="det-ttl">${esc(p.name)}</div>
      <button class="ed-btn" title="Edit name" data-act="edit-name">✎</button>
    </div>`;
  }

  // ── Project description (Feature 2) ──
  let descHtml;
  if(S.editingField==='desc'){
    descHtml=`<div style="margin-bottom:20px">
      <textarea id="ei-desc" class="inline-textarea">${esc(p.desc)}</textarea>
      <div class="inline-hint">Ctrl+Enter to save · Esc to cancel</div>
    </div>`;
  } else {
    descHtml=`<div class="det-ds-wrap" data-act="edit-desc">
      <div class="det-ds">${esc(p.desc)}</div>
      <button class="ed-btn" title="Edit description" data-act="edit-desc">✎</button>
    </div>`;
  }

  // ── Numeric section (Feature 3) ──
  let numSec='';
  if(p.hasNum){
    const ef=S.showEditNum
      ?`<div style="display:flex;gap:6px;align-items:center;margin-top:10px"><input id="en-v" type="number" value="${p.cur}" style="width:120px;background:rgba(255,255,255,.04);border:0.5px solid rgba(212,175,106,.26);border-radius:6px;color:#F5EDD8;font-size:13px;padding:7px 10px"><button class="btn btng btns" data-act="save-num">Update</button><button class="btn btns" data-act="cancel-num">Cancel</button></div>`
      :`<button class="btn btns" style="margin-top:8px" data-act="edit-num">Update value</button>`;

    let tgtLine;
    if(S.editingField==='tgt'){
      tgtLine=`<div class="tgt-form">
        <input id="et-cur" class="tw" type="number" value="${p.cur}" placeholder="current">
        <span style="color:var(--cs);font-size:16px">/</span>
        <input id="et-tgt" class="tw" type="number" value="${p.tgt}" placeholder="target">
        <input id="et-unit" class="uw" type="text" value="${esc(p.unit)}" placeholder="unit">
        <button class="btn btng btns" data-act="save-tgt">Save</button>
        <button class="btn btns" data-act="cancel-tgt">Cancel</button>
      </div>`;
    } else {
      tgtLine=`<div class="tgt-edit-pencil-wrap" data-act="edit-tgt">
        <span class="nc">${p.cur.toLocaleString()}</span>
        <span class="nt">/ ${p.tgt.toLocaleString()}</span>
        ${p.unit?`<span class="nu">${esc(p.unit)}</span>`:''}
        <button class="ed-btn" title="Edit target" data-act="edit-tgt" style="margin-left:4px;font-size:12px">✎</button>
      </div>`;
    }

    numSec=`${sdiv('progress')}${tgtLine}<div class="pbb"><div class="pbf" style="width:${pct}%;background:${col}"></div></div><div class="pp">${pct}% complete</div>${ef}`;
  }

  // ── Milestones (Feature 4 + Feature 6 delete) ──
  const msItems=p.mil.map(ms=>{
    if(S.editingMsId===ms.id){
      return `<div class="mi-edit-row">
        <div class="mg${ms.d?' on':''}" style="${ms.d?`background:${col};border-color:${col}`:''}" data-act="toggle-ms" data-mid="${ms.id}"><div class="mg-in" style="${ms.d?'background:rgba(255,255,255,.9)':''}"></div></div>
        <input id="ems-${ms.id}" class="" value="${esc(ms.t)}" style="flex:1;font-size:13px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.04);border:0.5px solid rgba(212,175,106,.26);border-radius:6px;color:var(--cr);padding:5px 9px;outline:none;">
        <button class="btn btng btns" data-act="save-ms-edit" data-mid="${ms.id}">Save</button>
        <button class="btn btns" data-act="cancel-ms-edit">Cancel</button>
      </div>`;
    }
    return `<div class="mi">
      <div class="mg${ms.d?' on':''}" style="${ms.d?`background:${col};border-color:${col}`:''}" data-act="toggle-ms" data-mid="${ms.id}"><div class="mg-in" style="${ms.d?'background:rgba(255,255,255,.9)':''}"></div></div>
      <span class="mt${ms.d?' on':''}">${esc(ms.t)}</span>
      <span class="md">${ms.dt?fmt(ms.dt):''}</span>
      <div class="mi-actions">
        <button class="ed-btn" data-act="edit-ms" data-mid="${ms.id}" title="Edit milestone" style="opacity:0;transition:opacity .15s">✎</button>
        <button class="ed-btn" data-act="del-ms" data-mid="${ms.id}" title="Delete milestone" style="opacity:0;transition:opacity .15s;color:var(--ct)">×</button>
      </div>
    </div>`;
  }).join('');
  const addMsR=S.showAddMs?`<div class="ir"><input id="new-ms" type="text" placeholder="New milestone..."><button class="btn btng btns" data-act="save-ms">Add</button><button class="btn btns" data-act="cancel-ms">Cancel</button></div>`:`<button class="btn btns" style="margin-top:6px" data-act="toggle-add-ms">+ milestone</button>`;
  const doneMsCt=p.mil.filter(m=>m.d).length;

  // ── Log entries (Feature 5 + Feature 6 delete) ──
  const logItems=[...p.log].reverse().map(e=>{
    if(S.editingLogId===e.id){
      return `<div class="li">
        <div class="lh"><span class="ld">${fmt(e.date)}</span>${e.val!=null||p.hasNum?`<input id="elv-${e.id}" type="number" value="${e.val!=null?e.val:''}" placeholder="value" style="width:90px;font-size:10px;background:rgba(255,255,255,.04);border:0.5px solid rgba(212,175,106,.26);border-radius:5px;color:var(--g);padding:2px 6px;font-family:'DM Sans',sans-serif;outline:none;" ${e.val==null&&!p.hasNum?'style="display:none"':''}>`:''}</div>
        <textarea id="eln-${e.id}" class="inline-textarea" style="min-height:40px;margin-top:4px">${esc(e.note)}</textarea>
        <div class="inline-actions">
          <button class="btn btng btns" data-act="save-log-edit" data-lid="${e.id}">Save</button>
          <button class="btn btns" data-act="cancel-log-edit">Cancel</button>
        </div>
      </div>`;
    }
    return `<div class="li">
      <div class="lh">
        <span class="ld">${fmt(e.date)}</span>
        ${e.val!=null?`<span class="lv">${Number(e.val).toLocaleString()} ${esc(p.unit)}</span>`:''}
      </div>
      <div class="ln">${esc(e.note)}</div>
      <div class="li-actions">
        <button class="ed-btn" data-act="edit-log" data-lid="${e.id}" title="Edit entry">✎</button>
        <button class="ed-btn" data-act="del-log" data-lid="${e.id}" title="Delete entry" style="color:var(--ct)">×</button>
      </div>
    </div>`;
  }).join('');

  const entF=S.showEntry?`<div class="fb"><div class="fr"><label>Date</label><input id="ef-d" type="date" value="${today()}"></div>${p.hasNum?`<div class="fr"><label>Updated value — ${esc(p.unit)}</label><input id="ef-v" type="number" value="${p.cur}"></div>`:''}<div class="fr"><label>Note</label><textarea id="ef-n" placeholder="What happened? What did you do?"></textarea></div><div class="acts"><button class="btn btng btns" data-act="save-entry">Save</button><button class="btn btns" data-act="cancel-entry">Cancel</button></div></div>`:`<button class="btn btns" style="margin-bottom:8px" data-act="show-entry">+ log update</button>`;

  const sOpts=['active','paused','completed'].map(s=>`<option value="${s}"${p.status===s?' selected':''}>${s}</option>`).join('');

  // ── Project delete zone (Feature 6) ──
  const delLabel=S.deleteProjConfirm?'Click again to confirm — this hides the project':'Remove project';
  const delClass=S.deleteProjConfirm?'proj-del-btn confirm':'proj-del-btn';
  const projDelZone=`<div class="proj-del-zone">
    <button class="${delClass}" data-act="del-proj">${delLabel}</button>
  </div>`;

  m.innerHTML=`<div class="det-ey" style="color:${col}">${catSVG(p.catId,col,10)}<span>${catName}</span></div>
    <div class="det-tr">${titleHtml}<select class="ssel" data-act="change-status">${sOpts}</select></div>
    ${descHtml}
    ${numSec}
    ${sdiv(`milestones — ${doneMsCt} of ${p.mil.length}`)}
    ${msItems}${addMsR}
    ${sdiv('log')}
    ${entF}${p.log.length?logItems:`<div class="emp">Nothing logged yet.</div>`}
    ${projDelZone}`;

  // Auto-focus inline inputs and wire their keyboard events
  _bindInlineEdits(p);
}

// Wire keyboard/blur handlers for active inline edits (called after renderMain)
function _bindInlineEdits(p){
  // Feature 1: name input
  const nameIn=document.getElementById('ei-name');
  if(nameIn){
    nameIn.focus();nameIn.select();
    nameIn.onkeydown=e=>{
      if(e.key==='Enter'){e.preventDefault();_saveNameEdit(p);}
      else if(e.key==='Escape'){S.editingField=null;renderMain();bindAll();}
    };
    nameIn.onblur=()=>{
      // Small delay so click on action buttons isn't swallowed
      setTimeout(()=>{if(S.editingField==='name')_saveNameEdit(p);},120);
    };
  }

  // Feature 2: description textarea
  const descIn=document.getElementById('ei-desc');
  if(descIn){
    descIn.focus();
    // Auto-fit height
    descIn.style.height='auto';descIn.style.height=Math.min(descIn.scrollHeight,140)+'px';
    descIn.oninput=()=>{descIn.style.height='auto';descIn.style.height=Math.min(descIn.scrollHeight,140)+'px';};
    descIn.onkeydown=e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();_saveDescEdit(p);}
      else if(e.key==='Escape'){S.editingField=null;renderMain();bindAll();}
    };
    descIn.onblur=()=>{
      setTimeout(()=>{if(S.editingField==='desc')_saveDescEdit(p);},120);
    };
  }

  // Feature 3: tgt inputs — no special binding needed beyond the buttons
  const tgtIn=document.getElementById('et-tgt');
  if(tgtIn)tgtIn.focus();

  // Feature 4: milestone edit inputs
  if(S.editingMsId){
    const msIn=document.getElementById(`ems-${S.editingMsId}`);
    if(msIn){
      msIn.focus();msIn.select();
      const mid=S.editingMsId;
      msIn.onkeydown=e=>{
        if(e.key==='Enter'){e.preventDefault();_saveMsEdit(p,mid);}
        else if(e.key==='Escape'){S.editingMsId=null;renderMain();bindAll();}
      };
      msIn.onblur=()=>{
        setTimeout(()=>{if(S.editingMsId===mid)_saveMsEdit(p,mid);},120);
      };
    }
  }

  // Feature 5: log edit textarea
  if(S.editingLogId){
    const lid=S.editingLogId;
    const logIn=document.getElementById(`eln-${lid}`);
    if(logIn){
      logIn.focus();
      logIn.style.height='auto';logIn.style.height=Math.min(logIn.scrollHeight,140)+'px';
      logIn.oninput=()=>{logIn.style.height='auto';logIn.style.height=Math.min(logIn.scrollHeight,140)+'px';};
      logIn.onkeydown=e=>{
        if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();_saveLogEdit(p,lid);}
        else if(e.key==='Escape'){S.editingLogId=null;renderMain();bindAll();}
      };
      // blur on both note and value saves
      const saveOnBlur=()=>setTimeout(()=>{if(S.editingLogId===lid)_saveLogEdit(p,lid);},120);
      logIn.onblur=saveOnBlur;
      const valIn=document.getElementById(`elv-${lid}`);
      if(valIn)valIn.onblur=saveOnBlur;
    }
  }
}

function vOverview(){
  const ps=S.data.projects;
  const overall=Math.round(ps.reduce((s,p)=>s+getPct(p),0)/ps.length);
  const done=ps.filter(p=>p.status==='completed').length;
  const cats=S.data.categories.map(c=>{
    const cps=ps.filter(p=>p.catId===c.id);
    const pct=cps.length?Math.round(cps.reduce((s,p)=>s+getPct(p),0)/cps.length):0;
    const col=CC[c.id];
    return`<div class="ov-cat" style="border-left-color:${col}" data-act="ov-cat" data-cat="${c.id}"><div class="ov-cat-ico">${catSVG(c.id,col,36)}</div><div class="ov-cat-nm">${c.name}</div><div class="ov-cat-me">${cps.length} projects · ${pct}%</div><div class="ov-cat-br" style="background:${col};width:${pct}%"></div></div>`;
  }).join('');
  return`<div class="ov-fr">
    <div class="oc tl"></div><div class="oc tr"></div><div class="oc bl"></div><div class="oc br"></div>
    <div class="ov-ey"><div class="ov-ey-l"></div>${starSVG(10,.6)}<div class="ov-ey-t">my life dashboard · 2026</div>${starSVG(10,.6)}<div class="ov-ey-l"></div></div>
    <div class="ov-ttl">Building the next<br>version of herself.</div>
    <div class="ov-sub">${done} of ${ps.length} projects · ${overall}% complete · year one of many</div>
    <div class="ov-bar"><div class="ov-barf" style="width:${overall}%"></div></div>
    <div class="ov-bl" style="margin-bottom:16px">${overall}% overall · select any project in the sidebar</div>
    <div class="ov-cats">${cats}</div>
  </div>`;
}

// ── BIND EVENTS ──
function render(){renderSidebar();renderMain();bindAll();}

function bindAll(){
  const app=document.getElementById('app');
  app.onclick=e=>{
    const el=e.target.closest('[data-act]');if(!el)return;
    const a=el.dataset.act;
    if(a==='toggle-cat'){S.collapsed[el.dataset.cat]=!S.collapsed[el.dataset.cat];render();}
    else if(a==='sel'){
      // Don't switch project if we're in the middle of an inline edit within a button that bubbles
      S.selId=el.dataset.proj;
      S.showEntry=false;S.showAddMs=false;S.showEditNum=false;
      S.editingField=null;S.editingMsId=null;S.editingLogId=null;S.deleteProjConfirm=false;
      render();
    }
    else if(a==='ov-cat'){S.collapsed[el.dataset.cat]=false;renderSidebar();bindAll();}
    else if(a==='start-add-proj'){S.addProjCat=el.dataset.cat;render();}
    else if(a==='cancel-add-proj'){S.addProjCat=null;render();}
    else if(a==='save-proj'){saveProj(el.dataset.cat);}
    else if(a==='show-entry'){S.showEntry=true;renderMain();bindAll();}
    else if(a==='cancel-entry'){S.showEntry=false;renderMain();bindAll();}
    else if(a==='save-entry'){saveEntry();}
    else if(a==='toggle-ms'){toggleMs(el.dataset.mid);}
    else if(a==='toggle-add-ms'){S.showAddMs=true;renderMain();bindAll();}
    else if(a==='cancel-ms'){S.showAddMs=false;renderMain();bindAll();}
    else if(a==='save-ms'){saveMs();}
    else if(a==='edit-num'){S.showEditNum=true;renderMain();bindAll();}
    else if(a==='cancel-num'){S.showEditNum=false;renderMain();bindAll();}
    else if(a==='save-num'){saveNum();}
    else if(a==='open-drawer'){openDrawer();}
    else if(a==='import-data'){importLegacy();}
    else if(a==='export-data'){exportData();}
    else if(a==='sign-out'){sb.auth.signOut();}
    else if(a==='close-drawer'){const d=document.getElementById('drawer');if(d)d.classList.remove('on');}
    // ── Feature 1 ──
    else if(a==='edit-name'){
      e.stopPropagation();
      S.editingField='name';S.editingMsId=null;S.editingLogId=null;
      renderMain();bindAll();
    }
    // ── Feature 2 ──
    else if(a==='edit-desc'){
      e.stopPropagation();
      S.editingField='desc';S.editingMsId=null;S.editingLogId=null;
      renderMain();bindAll();
    }
    // ── Feature 3 ──
    else if(a==='edit-tgt'){
      e.stopPropagation();
      S.editingField='tgt';S.editingMsId=null;S.editingLogId=null;
      renderMain();bindAll();
    }
    else if(a==='save-tgt'){saveTgt();}
    else if(a==='cancel-tgt'){S.editingField=null;renderMain();bindAll();}
    // ── Feature 4 ──
    else if(a==='edit-ms'){
      e.stopPropagation();
      S.editingMsId=el.dataset.mid;S.editingField=null;S.editingLogId=null;
      renderMain();bindAll();
    }
    else if(a==='save-ms-edit'){
      const p=S.data.projects.find(x=>x.id===S.selId);
      _saveMsEdit(p,el.dataset.mid);
    }
    else if(a==='cancel-ms-edit'){S.editingMsId=null;renderMain();bindAll();}
    // ── Feature 5 ──
    else if(a==='edit-log'){
      e.stopPropagation();
      S.editingLogId=el.dataset.lid;S.editingField=null;S.editingMsId=null;
      renderMain();bindAll();
    }
    else if(a==='save-log-edit'){
      const p=S.data.projects.find(x=>x.id===S.selId);
      _saveLogEdit(p,el.dataset.lid);
    }
    else if(a==='cancel-log-edit'){S.editingLogId=null;renderMain();bindAll();}
    // ── Feature 6: delete milestone ──
    else if(a==='del-ms'){e.stopPropagation();showDelMsToast(el.dataset.mid);}
    // ── Feature 6: delete log entry ──
    else if(a==='del-log'){e.stopPropagation();showDelLogToast(el.dataset.lid);}
    // ── Feature 6: delete project ──
    else if(a==='del-proj'){
      if(!S.deleteProjConfirm){
        S.deleteProjConfirm=true;renderMain();bindAll();
      } else {
        deleteProject();
      }
    }
  };
  app.onchange=e=>{
    const el=e.target.closest('[data-act]');if(!el)return;
    if(el.dataset.act==='change-status')changeStatus(el.value);
  };
  const ns=document.getElementById('np-nt');
  if(ns)ns.onchange=()=>{const f=document.getElementById('np-nf');if(f)f.style.display=ns.value==='yes'?'block':'none';};

  // Drag-and-drop reorder for projects within a category.
  app.ondragstart=e=>{
    const el=e.target.closest('.pi[draggable="true"]');if(!el)return;
    _drag={projId:el.dataset.proj,catId:el.dataset.cat,srcEl:el};
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',el.dataset.proj);}catch{}
  };
  app.ondragover=e=>{
    if(!_drag)return;
    const target=e.target.closest('.pi');
    if(!target||target===_drag.srcEl)return;
    if(target.dataset.cat!==_drag.catId)return;
    e.preventDefault();e.dataTransfer.dropEffect='move';
    const rect=target.getBoundingClientRect();
    const above=e.clientY<rect.top+rect.height/2;
    document.querySelectorAll('.pi.drop-above,.pi.drop-below').forEach(el=>{
      if(el!==target)el.classList.remove('drop-above','drop-below');
    });
    target.classList.toggle('drop-above',above);
    target.classList.toggle('drop-below',!above);
  };
  app.ondragleave=e=>{
    const target=e.target.closest('.pi');if(!target)return;
    if(!e.relatedTarget||!target.contains(e.relatedTarget)){
      target.classList.remove('drop-above','drop-below');
    }
  };
  app.ondrop=e=>{
    if(!_drag)return;
    const target=e.target.closest('.pi');
    if(!target||target===_drag.srcEl)return;
    if(target.dataset.cat!==_drag.catId)return;
    e.preventDefault();
    const rect=target.getBoundingClientRect();
    const above=e.clientY<rect.top+rect.height/2;
    reorderProjects(_drag.projId,target.dataset.proj,above);
  };
  app.ondragend=()=>{
    if(_drag&&_drag.srcEl)_drag.srcEl.classList.remove('dragging');
    document.querySelectorAll('.pi.drop-above,.pi.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
    _drag=null;
  };

  // Milestone hover: show action buttons
  document.querySelectorAll('.mi').forEach(mi=>{
    mi.onmouseenter=()=>{const ac=mi.querySelector('.mi-actions');if(ac){ac.querySelectorAll('.ed-btn').forEach(b=>b.style.opacity='.55');}};
    mi.onmouseleave=()=>{const ac=mi.querySelector('.mi-actions');if(ac){ac.querySelectorAll('.ed-btn').forEach(b=>b.style.opacity='0');}};
  });
}

let _drag=null;
async function reorderProjects(srcId,targetId,insertAbove){
  const projects=S.data.projects;
  const src=projects.find(p=>p.id===srcId);
  const tgt=projects.find(p=>p.id===targetId);
  if(!src||!tgt||src.catId!==tgt.catId)return;
  const srcIdx=projects.indexOf(src);
  projects.splice(srcIdx,1);
  let tgtIdx=projects.indexOf(tgt);
  if(!insertAbove)tgtIdx+=1;
  projects.splice(tgtIdx,0,src);
  const catProjs=projects.filter(p=>p.catId===src.catId);
  catProjs.forEach((p,i)=>p.sortOrder=i+1);
  render();
  await Promise.all(catProjs.map(p=>
    write('projects','update',{id:p.id,values:{sort_order:p.sortOrder}})
  ));
}

// ── CLOUD WRITES ──
// Optimistic: caller mutates S.data then calls write(). On failure: showError + revert.
let _writeCount=0;
function _showSaving(on){_writeCount+=on?1:-1;const s=document.getElementById('savi');if(s)s.classList.toggle('on',_writeCount>0);}

async function write(table, op, payload){
  _showSaving(true);
  try{
    let res;
    if(op==='insert')res=await sb.from(table).insert(payload).select().single();
    else if(op==='update')res=await sb.from(table).update(payload.values).eq('id',payload.id).select().single();
    else if(op==='upsert')res=await sb.from(table).upsert(payload).select().single();
    if(res.error){showError("Couldn't save — tap to retry.",()=>write(table,op,payload));return null;}
    // Best-effort audit log; non-blocking
    sb.from('events').insert({actor:'web',op,table_name:table,row_id:res.data.id,after:res.data}).then(()=>{});
    return res.data;
  }finally{_showSaving(false);}
}

function showError(msg,onRetry){
  let t=document.getElementById('ftoast');
  if(!t){t=document.createElement('div');t.id='ftoast';t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bgf);border:0.5px solid var(--g);border-radius:10px;padding:11px 16px;color:var(--cr);font-size:12.5px;z-index:9999;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.5);';document.body.appendChild(t);}
  t.textContent=msg;t.onclick=()=>{t.remove();if(onRetry)onRetry();};
  setTimeout(()=>{if(t.parentNode)t.style.opacity='.6';},6000);
}

async function saveProj(catId){

  const desc=document.getElementById('np-d')?.value?.trim()||'';

  const tgt=isNum?(parseFloat(document.getElementById('np-t')?.value)||100):100;
  const unit=isNum?(document.getElementById('np-u')?.value||''):'';
  S.data.projects.push({id,catId,name,desc,hasNum:isNum,cur,tgt,unit,hasMil:true,hasLog:true,mil:[],log:[],status:'active'});

function renderLogin(){
  const app=document.getElementById('app');

    <div id="lv-otp-fld" style="display:none" class="lv-fld"><label>6-digit code</label><input id="lv-code" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="••••••"></div>
    <div class="lv-act"><button id="lv-go" class="btn btng" style="width:100%;padding:11px 14px;font-size:13px">Send magic link</button></div>
    <div id="lv-msg" class="lv-msg"></div>
    <div id="lv-otp-toggle" class="lv-otp">Use 6-digit code instead</div>
  </div>`;
  const email=document.getElementById('lv-email');
  const code=document.getElementById('lv-code');
  const go=document.getElementById('lv-go');
  const msg=document.getElementById('lv-msg');
  const toggle=document.getElementById('lv-otp-toggle');
  const otpFld=document.getElementById('lv-otp-fld');
  let useOtp=false;
  toggle.onclick=()=>{useOtp=!useOtp;otpFld.style.display=useOtp?'block':'none';go.textContent=useOtp?'Verify code':'Send magic link';toggle.textContent=useOtp?'Use magic link instead':'Use 6-digit code instead';msg.textContent='';};
  go.onclick=async()=>{
    const e=email.value.trim();if(!e){msg.textContent='Enter your email.';return;}
    if(useOtp&&code.value.trim().length===6){
      msg.textContent='Verifying…';
      const{error}=await sb.auth.verifyOtp({email:e,token:code.value.trim(),type:'email'});
      if(error){msg.textContent=error.message;return;}
      // session set; main flow takes over
      bootstrap();return;
    }
    msg.textContent='Sending…';

async function importLegacy(){
  const c=document.querySelector('.drawer-c');
  c.innerHTML=`<h3>Restore from old localStorage</h3>
    <div class="row" style="font-size:11px;color:var(--cs);line-height:1.6">Paste the JSON you exported from the old dashboard:</div>
    <textarea id="imp-box" class="import-box" placeholder='{"categories":[...],"projects":[...]}'></textarea>
    <div style="display:flex;gap:8px;margin-top:10px"><button class="btn btng btns" id="imp-go">Import</button><button class="btn btns" data-act="close-drawer">Cancel</button></div>
    <div id="imp-msg" style="margin-top:10px;font-size:11px;color:var(--cs)"></div>`;
  document.getElementById('imp-go').onclick=async()=>{
    const txt=document.getElementById('imp-box').value.trim();
    const msg=document.getElementById('imp-msg');
    let parsed;try{parsed=JSON.parse(txt);}catch{msg.textContent='Invalid JSON.';return;}
    msg.textContent='Importing…';
    try{
      const proj=parsed.projects||[];
      for(const p of proj){
        await sb.from('projects').upsert({id:p.id,category_id:p.catId,name:p.name,description:p.desc||'',has_num:!!p.hasNum,cur:Number(p.cur)||0,tgt:Number(p.tgt)||0,unit:p.unit||'',status:p.status||'active'});
        for(const m of (p.mil||[])) await sb.from('milestones').upsert({id:m.id,project_id:p.id,title:m.t,done:!!m.d,done_at:m.dt?new Date(m.dt+'T00:00:00Z').toISOString():null});
        for(const l of (p.log||[])) await sb.from('log_entries').upsert({id:l.id,project_id:p.id,date:l.date,note:l.note,val:l.val!=null?Number(l.val):null});
      }
      msg.textContent='Imported. Refreshing…';
      await loadFromCloud();render();
      setTimeout(()=>{const d=document.getElementById('drawer');if(d)d.classList.remove('on');},700);
    }catch(e){msg.textContent='Failed: '+e.message;}
  };
}

function exportData(){
  const blob=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`vision-${today()}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// ── INIT ──
async function bootstrap(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){renderLogin();return;}
  await loadFromCloud();
  render();
  subscribeRealtime();
}
sb.auth.onAuthStateChange((event)=>{if(event==='SIGNED_IN'||event==='SIGNED_OUT')bootstrap();});
bootstrap();
</script>
